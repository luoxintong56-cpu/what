<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静谧之中 · Final</title>

<style>
body {
    font-family: "Microsoft YaHei", sans-serif;
    background: radial-gradient(circle at top, #2a2a3d, #14141f);
    color: #e8e6f1;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
}

/* 标题 */
h1 {
    text-align: center;
    color: #d8b4fe;
    letter-spacing: 3px;
}
.subtitle {
    text-align: center;
    font-size: 13px;
    color: #a78bfa;
    margin-bottom: 20px;
    font-style: italic;
}

/* BGM按钮 */
.bgm-btn {
    display: block;
    margin: 0 auto 20px;
    padding: 8px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    color: #e8e6f1;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 18px;
    padding: 18px;
    margin: 18px 0;
    backdrop-filter: blur(10px);
}
.day-title {
    color: #c4b5fd;
    margin-bottom: 10px;
}

/* 任务 */
.task {
    display: flex;
    align-items: center;
    margin: 8px 0;
}

input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid #c4b5fd;
    border-radius: 4px;
    margin-right: 10px;
}
input[type="checkbox"]:checked {
    background: #c4b5fd;
}
input[type="checkbox"]:checked::after {
    content: "✦";
    position: relative;
    left: 2px;
    color: #1a1a2e;
}

/* 进度条 */
.progress {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    margin-top: 10px;
}
.progress-inner {
    height: 6px;
    background: linear-gradient(90deg, #c4b5fd, #f9a8d4);
    width: 0%;
}

/* 台词 */
.message {
    margin-top: 10px;
    font-size: 12px;
    color: #b8b8d1;
    min-height: 16px;
}
</style>
</head>

<body>

<h1>✦ 静谧之中 ✦</h1>
<div class="subtitle">在无人察觉的时刻，你正在一点点改变未来</div>

<button class="bgm-btn" onclick="toggleMusic()">🎧 播放 / 暂停 BGM</button>
<audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b1d7b.mp3" type="audio/mpeg">
</audio>

<div id="container"></div>

<script>
const days = ["周一","周二","周三","周四","周五","周六","周日"];

const tasks = [
"📘 高数 · 做10道极限/导数题",
"📘 高数 · 整理错题",
"📖 英语 · 背30个单词",
"📖 英语 · 精读1篇阅读",
"🇯🇵 日语 · 背20个单词",
"🇯🇵 日语 · 学1个语法",
"💻 编程 · 看30分钟课程",
"💻 编程 · 写一个小练习",
"✍️ 写作 · 写一段情绪记录",
"🎬 剪辑 · 找素材 / 选BGM",
"🎬 剪辑 · 卡点对齐",
"🌙 放松 · 给自己一点时间"
];

// 台词池
const messagePool = {
    start:["还没开始？","在等什么。","不动的话不会改变。"],
    low:["先动起来。","继续。","别停。","至少开始了。"],
    mid:["还不错。","比刚才更好了。","节奏对了。"],
    high:["继续保持。","别松懈。","再坚持一下。"],
    near:["差一点了。","现在停太可惜。","就快结束了。"],
    done:["……做得很好。","可以休息了。","辛苦了。"]
};

function getMessage(p){
    let pool;
    if(p===0) pool=messagePool.start;
    else if(p<30) pool=messagePool.low;
    else if(p<60) pool=messagePool.mid;
    else if(p<90) pool=messagePool.high;
    else if(p<100) pool=messagePool.near;
    else pool=messagePool.done;

    return pool[Math.floor(Math.random()*pool.length)];
}

function init(){
    const container = document.getElementById("container");

    days.forEach(day=>{
        let card = document.createElement("div");
        card.className="card";

        let html = `<div class="day-title">${day}</div>`;

        tasks.forEach(task=>{
            html += `
            <label class="task">
                <input type="checkbox" onchange="update(this)">
                <span>${task}</span>
            </label>`;
        });

        html += `
        <div class="progress"><div class="progress-inner"></div></div>
        <div class="message"></div>
        `;

        card.innerHTML = html;
        container.appendChild(card);
    });
}

function update(el){
    const card = el.closest(".card");
    const checks = card.querySelectorAll("input");
    const checked = card.querySelectorAll("input:checked");
    const percent = Math.round((checked.length/checks.length)*100);

    card.querySelector(".progress-inner").style.width = percent + "%";
    card.querySelector(".message").innerText = getMessage(percent);
}

// BGM控制
function toggleMusic(){
    const audio = document.getElementById("bgm");
    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

window.onload = init;
</script>

</body>
</html>
